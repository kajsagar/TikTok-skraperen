name: TikTok Story Scraper

on:
  schedule:
    # Kjører minutt 0, hver 5. time (00:00, 05:00, 10:00 osv.)
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Hent koden
        uses: actions/checkout@v4
      
      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Installer biblioteker
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Kjør Skraperen
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: python main.py

      - name: Lagre database
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add tiktok_state.db
          git commit -m "Auto-oppdatert database" || echo "Ingen nye videoer å lagre"
          git push